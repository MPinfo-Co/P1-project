name: Chore（PM 行政事務）
description: 學習、文件、環境維護等非功能開發事務
title: '[Chore] '
labels: ['chore']
body:
  - type: dropdown
    id: type
    attributes:
      label: 類型
      options:
        - 學習
        - 文件
        - 環境維護
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 說明
      description: 要做什麼？為什麼需要？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 完成條件
      description: 怎樣算完成？
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ---
        > 此 Issue 僅用於追蹤 PM 行政事務，不會觸發任何自動化流程。
