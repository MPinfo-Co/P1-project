name: Chore-workflow

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  create-pg-issue:
    if: github.event.label.name == 'chore'
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PG Issue + C-Branch in P1-code
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = 'MPinfo-Co';
            const projectRepo = 'P1-project';
            const codeRepo = 'P1-code';

            const choreIssue = context.payload.issue;
            const choreNumber = choreIssue.number;
            const choreTitle = choreIssue.title.replace(/^\[Chore\]\s*/i, '');

            const slug = choreTitle
              .toLowerCase()
              .trim()
              .replace(/['"]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 50) || 'chore';

            // 在 P1-code 建立 PG Issue
            const pgIssue = await github.rest.issues.create({
              owner: org,
              repo: codeRepo,
              title: `[PG] ${choreTitle}`,
              body: [
                '## 實作範圍',
                choreIssue.body || '',
                '',
                '## 關聯項目',
                `- Chore Issue：MPinfo-Co/P1-project#${choreNumber}`,
                `- PG Issue：P1-code #（本 Issue）`,
                `- 階段：PG（Chore）`,
              ].join('\n'),
              labels: ['PG'],
            });

            const pgNumber = pgIssue.data.number;

            // 回填 PG Issue body 真實編號
            await github.rest.issues.update({
              owner: org,
              repo: codeRepo,
              issue_number: pgNumber,
              body: pgIssue.data.body.replace(
                'PG Issue：P1-code #（本 Issue）',
                `PG Issue：P1-code #${pgNumber}`
              ),
            });

            // 取得 P1-code main SHA
            const mainRef = await github.rest.git.getRef({
              owner: org,
              repo: codeRepo,
              ref: 'heads/main',
            });

            const cBranchName = `chore-${pgNumber}-${slug}`;

            // 建立 C-Branch
            try {
              await github.rest.git.createRef({
                owner: org,
                repo: codeRepo,
                ref: `refs/heads/${cBranchName}`,
                sha: mainRef.data.object.sha,
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // 回填 Chore Issue body 的 PG Issue 編號
            await github.rest.issues.update({
              owner: org,
              repo: projectRepo,
              issue_number: choreNumber,
              body: (choreIssue.body || '') + [
                '',
                '',
                '---',
                '## 關聯 Issue（系統自動填入）',
                `- PG Issue：MPinfo-Co/P1-code#${pgNumber}`,
                `- 分支：\`${cBranchName}\``,
              ].join('\n'),
            });

            // 在 Chore Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: projectRepo,
              issue_number: choreNumber,
              body: [
                `✅ **PG Issue 已自動建立**`,
                `- Issue：[P1-code #${pgNumber}](https://github.com/${org}/${codeRepo}/issues/${pgNumber})`,
                `- 分支：\`${cBranchName}\``,
                ``,
                `PG／AI 請至 P1-code 開始執行。`,
              ].join('\n'),
            });
