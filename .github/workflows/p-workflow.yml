# 規格說明：https://github.com/MPinfo-Co/P1-project/blob/main/docs/github-workflow/p-workflow.md
name: P-workflow

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  create-sa-issue:
    if: github.event.label.name == 'epic'
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create SA Issue + A-Branch, update Epic
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const epicIssue = context.payload.issue;
            const epicNumber = epicIssue.number;
            const epicTitle = epicIssue.title.replace(/^\[PM\]\s*/i, '');
            const org = 'MPinfo-Co';
            const analysisRepo = 'P1-analysis';

            const slug = epicTitle
              .toLowerCase()
              .trim()
              .replace(/['"]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 50) || 'issue';

            // 1. 在 P1-analysis 建立 SA Issue
            const saIssue = await github.rest.issues.create({
              owner: org,
              repo: analysisRepo,
              title: `[SA] ${epicTitle}`,
              body: [
                '## 關聯項目',
                '',
                '### 工作狀態',
                `- 階段：SA`,
                `- 分支：（待填入）`,
                `- Draft PR：（待建立）`,
                '',
                '### 關聯 Issue',
                `- Epic：MPinfo-Co/P1-project#${epicNumber}`,
                `- SA Issue：#（本 Issue）`,
                `- SD Issue：P1-design #（merge 後自動填入）`,
                `- PG Issue：P1-code #（merge 後自動填入）`,
                '',
                '### 關聯檔案',
                `- business-logic.md：（待填入）`,
              ].join('\n'),
              labels: ['SA'],
            });

            const saNumber = saIssue.data.number;
            const branchName = `issue-${saNumber}-${slug}`;

            // ← backfill 移到 Draft PR 建立後，見下方

            // 2. 將 SA Issue 掛為 Epic 的 sub-issue
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                owner: org,
                repo: 'P1-project',
                issue_number: epicNumber,
                sub_issue_id: saIssue.data.id,
              });
            } catch (e) {
              console.log(`Sub-issue 關聯建立失敗（非阻斷性）：${e.message}`);
            }

            // 3. 取得 P1-analysis main 的 SHA
            const mainRef = await github.rest.git.getRef({
              owner: org,
              repo: analysisRepo,
              ref: 'heads/main',
            });

            // 4. 建立 A-Branch
            try {
              await github.rest.git.createRef({
                owner: org,
                repo: analysisRepo,
                ref: `refs/heads/${branchName}`,
                sha: mainRef.data.object.sha,
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // 4. Scaffold SA 分析文件
            const epicBody = epicIssue.body || '';
            const businessLogicContent = [
              `# 業務邏輯分析：${epicTitle}`,
              '',
              '## 需求說明',
              epicBody,
              '',
              '## 商業邏輯（選填）',
              '',
              '## 資料模型示意（選填）',
              '',
              '## SD 注意事項（選填）',
              '',
              '## 畫面示意（選填）',
              '',
            ].join('\n');

            const scaffoldTree = await github.rest.git.createTree({
              owner: org,
              repo: analysisRepo,
              base_tree: mainRef.data.object.sha,
              tree: [
                {
                  path: `issue-${saNumber}/business-logic.md`,
                  mode: '100644',
                  type: 'blob',
                  content: businessLogicContent,
                },
              ],
            });

            const scaffoldCommit = await github.rest.git.createCommit({
              owner: org,
              repo: analysisRepo,
              message: `chore(issue-${saNumber}): scaffold SA 分析文件`,
              tree: scaffoldTree.data.sha,
              parents: [mainRef.data.object.sha],
            });

            await github.rest.git.updateRef({
              owner: org,
              repo: analysisRepo,
              ref: `heads/${branchName}`,
              sha: scaffoldCommit.data.sha,
            });

            // 建立 SA Draft PR
            let saPrNumber = null;
            let saPrUrl = null;
            try {
              const saPr = await github.rest.pulls.create({
                owner: org,
                repo: analysisRepo,
                head: branchName,
                base: 'main',
                draft: true,
                title: `[SA] ${epicTitle}`,
                body: `Closes #${saNumber}`,
              });
              saPrNumber = saPr.data.number;
              saPrUrl = saPr.data.html_url;
            } catch (e) {
              console.log(`SA Draft PR 建立失敗（非阻斷性）：${e.message}`);
            }

            // 回填 SA Issue body：編號 + 分支連結 + Draft PR 連結
            await github.rest.issues.update({
              owner: org,
              repo: analysisRepo,
              issue_number: saNumber,
              body: saIssue.data.body
                .replace('SA Issue：#（本 Issue）', `SA Issue：P1-analysis #${saNumber}`)
                .replace('分支：（待填入）', `分支：[${branchName}](https://github.com/${org}/${analysisRepo}/tree/${branchName})`)
                .replace('Draft PR：（待建立）', saPrUrl ? `Draft PR：[#${saPrNumber}](${saPrUrl})` : 'Draft PR：（未建立）')
                .replace('business-logic.md：（待填入）', `business-logic.md：[issue-${saNumber}/business-logic.md](https://github.com/${org}/${analysisRepo}/blob/${branchName}/issue-${saNumber}/business-logic.md)`),
            });

            // 5. 更新 Epic Issue body
            const currentBody = epicIssue.body || '';
            const relationSection = [
              '',
              '## 關聯 Issue',
              '<!-- 由系統自動填入，勿手動編輯 -->',
              `- SA Issue：MPinfo-Co/P1-analysis#${saNumber}`,
              `- SD Issue：P1-design #（待建立）`,
              `- PG Issue：P1-code #（待建立）`,
            ].join('\n');

            const hasRelation = currentBody.includes('## 關聯 Issue');
            const newBody = hasRelation
              ? currentBody.replace(
                  /## 關聯 Issue[\s\S]*?(?=\n## |\s*$)/,
                  relationSection.trim()
                )
              : currentBody + relationSection;

            await github.rest.issues.update({
              owner: org,
              repo: 'P1-project',
              issue_number: epicNumber,
              body: newBody,
            });

            // 6. 在 Epic Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: 'P1-project',
              issue_number: epicNumber,
              body: [
                `✅ **SA Issue 已自動建立**`,
                `- Issue：[P1-analysis #${saNumber}](https://github.com/${org}/${analysisRepo}/issues/${saNumber})`,
                `- 分支：\`${branchName}\``,
                ``,
                `SA 請至 P1-analysis 開始系統分析。`,
              ].join('\n'),
            });
