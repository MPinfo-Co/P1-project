name: P-workflow

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  create-sa-issue:
    if: github.event.label.name == 'epic'
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create SA Issue + A-Branch, update Epic
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const epicIssue = context.payload.issue;
            const epicNumber = epicIssue.number;
            const epicTitle = epicIssue.title.replace(/^\[PM\]\s*/i, '');
            const org = 'MPinfo-Co';
            const analysisRepo = 'P1-analysis';

            const slug = epicTitle
              .toLowerCase()
              .trim()
              .replace(/['"]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 50) || 'issue';

            // 1. 在 P1-analysis 建立 SA Issue
            const saIssue = await github.rest.issues.create({
              owner: org,
              repo: analysisRepo,
              title: `[SA] ${epicTitle}`,
              body: [
                '## 功能說明',
                '<!-- 分析此功能的商業邏輯 -->',
                '',
                '## 關聯項目',
                `- Epic：MPinfo-Co/P1-project#${epicNumber}`,
                `- SA Issue：#（本 Issue）`,
                `- SD Issue：P1-design #（merge 後自動填入）`,
                `- 階段：SA`,
              ].join('\n'),
              labels: ['SA'],
            });

            const saNumber = saIssue.data.number;
            const branchName = `issue-${saNumber}-${slug}`;

            // 回填 SA Issue body 的真實編號
            await github.rest.issues.update({
              owner: org,
              repo: analysisRepo,
              issue_number: saNumber,
              body: saIssue.data.body.replace(
                'SA Issue：#（本 Issue）',
                `SA Issue：P1-analysis #${saNumber}`
              ),
            });

            // 2. 將 SA Issue 掛為 Epic 的 sub-issue
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                owner: org,
                repo: 'P1-project',
                issue_number: epicNumber,
                sub_issue_id: saIssue.data.id,
              });
            } catch (e) {
              console.log(`Sub-issue 關聯建立失敗（非阻斷性）：${e.message}`);
            }

            // 3. 取得 P1-analysis main 的 SHA
            const mainRef = await github.rest.git.getRef({
              owner: org,
              repo: analysisRepo,
              ref: 'heads/main',
            });

            // 4. 建立 A-Branch
            try {
              await github.rest.git.createRef({
                owner: org,
                repo: analysisRepo,
                ref: `refs/heads/${branchName}`,
                sha: mainRef.data.object.sha,
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // 4. Scaffold SA 分析文件
            const businessLogicContent = [
              `# 業務邏輯分析：${epicTitle}`,
              '',
              '## Use Case',
              '',
              '## 流程圖',
              '',
              '## Class Diagram',
              '',
              '## ER 示意',
              '',
            ].join('\n');

            const sdWbsContent = [
              `# SD WBS：${epicTitle}`,
              '',
              '## 工作項目',
              '| # | 類型 | 說明 |',
              '|---|------|------|',
              '',
              '## 備註',
              '<!-- 有無特殊限制、相依關係、需 SD 決策的設計點 -->',
              '',
            ].join('\n');

            const scaffoldTree = await github.rest.git.createTree({
              owner: org,
              repo: analysisRepo,
              base_tree: mainRef.data.object.sha,
              tree: [
                {
                  path: `issue-${saNumber}/business-logic.md`,
                  mode: '100644',
                  type: 'blob',
                  content: businessLogicContent,
                },
                {
                  path: `issue-${saNumber}/SD-WBS.md`,
                  mode: '100644',
                  type: 'blob',
                  content: sdWbsContent,
                },
              ],
            });

            const scaffoldCommit = await github.rest.git.createCommit({
              owner: org,
              repo: analysisRepo,
              message: `chore(issue-${saNumber}): scaffold SA 分析文件`,
              tree: scaffoldTree.data.sha,
              parents: [mainRef.data.object.sha],
            });

            await github.rest.git.updateRef({
              owner: org,
              repo: analysisRepo,
              ref: `heads/${branchName}`,
              sha: scaffoldCommit.data.sha,
            });

            // 5. 更新 Epic Issue body
            const currentBody = epicIssue.body || '';
            const relationSection = [
              '',
              '## 關聯 Issue',
              '<!-- 由系統自動填入，勿手動編輯 -->',
              `- SA Issue：MPinfo-Co/P1-analysis#${saNumber}`,
              `- SD Issue：P1-design #（待建立）`,
              `- PG Issue：P1-code #（待建立）`,
            ].join('\n');

            const hasRelation = currentBody.includes('## 關聯 Issue');
            const newBody = hasRelation
              ? currentBody.replace(
                  /## 關聯 Issue[\s\S]*?(?=\n## |\s*$)/,
                  relationSection.trim()
                )
              : currentBody + relationSection;

            await github.rest.issues.update({
              owner: org,
              repo: 'P1-project',
              issue_number: epicNumber,
              body: newBody,
            });

            // 6. 在 Epic Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: 'P1-project',
              issue_number: epicNumber,
              body: [
                `✅ **SA Issue 已自動建立**`,
                `- Issue：[P1-analysis #${saNumber}](https://github.com/${org}/${analysisRepo}/issues/${saNumber})`,
                `- 分支：\`${branchName}\``,
                ``,
                `SA 請至 P1-analysis 開始系統分析。`,
              ].join('\n'),
            });
