name: P-workflow

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  create-sa-issue:
    if: github.event.label.name == 'epic'
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create SA Issue + A-Branch, update Epic
        id: create-sa
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const epicIssue = context.payload.issue;
            const epicNumber = epicIssue.number;
            const epicTitle = epicIssue.title.replace(/^\[PM\]\s*/i, '');
            const org = 'MPinfo-Co';
            const analysisRepo = 'P1-design';

            const slug = epicTitle
              .toLowerCase()
              .trim()
              .replace(/['"]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 50) || 'issue';

            // 1. 在 P1-design 建立 SA Issue
            const saIssue = await github.rest.issues.create({
              owner: org,
              repo: analysisRepo,
              title: `[SA] ${epicTitle}`,
              body: [
                '## 關聯項目',
                '',
                '### SA 工作文件',
                `- business-logic.md：（待填入）`,
                '',
                '### 關聯 Issue',
                `- Epic：MPinfo-Co/P1-project#${epicNumber}`,
                `- SA Issue：#（本 Issue）`,
                `- SD Issue：P1-design #（merge 後自動填入）`,
                '',
                '### 相關連結',
                `- 分支：（待填入）`,
                `- Draft PR：（待建立）`,
              ].join('\n'),
              labels: ['SA'],
            });

            const saNumber = saIssue.data.number;
            const branchName = `sa-${saNumber}-${slug}`;

            // ← backfill 移到 Draft PR 建立後，見下方

            // 2. 將 SA Issue 掛為 Epic 的 sub-issue
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                owner: org,
                repo: 'P1-project',
                issue_number: epicNumber,
                sub_issue_id: saIssue.data.id,
              });
            } catch (e) {
              console.log(`Sub-issue 關聯建立失敗（非阻斷性）：${e.message}`);
            }

            // 3. 取得 P1-design main 的 SHA
            const mainRef = await github.rest.git.getRef({
              owner: org,
              repo: analysisRepo,
              ref: 'heads/main',
            });

            // 4. 建立 A-Branch
            try {
              await github.rest.git.createRef({
                owner: org,
                repo: analysisRepo,
                ref: `refs/heads/${branchName}`,
                sha: mainRef.data.object.sha,
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // 4. Scaffold SA 分析文件
            const epicBody = (epicIssue.body || '').replace(/^##\s+需求說明\s*\n?/m, '').trim();
            const businessLogicContent = [
              `# 業務邏輯分析：${epicTitle}`,
              '',
              '## 需求說明',
              epicBody,
              '',
              '## 畫面/操作邏輯示意（選填）',
              '',
            ].join('\n');

            const scaffoldTree = await github.rest.git.createTree({
              owner: org,
              repo: analysisRepo,
              base_tree: mainRef.data.object.sha,
              tree: [
                {
                  path: `SA/sa-${saNumber}-logic.md`,
                  mode: '100644',
                  type: 'blob',
                  content: businessLogicContent,
                },
              ],
            });

            const scaffoldCommit = await github.rest.git.createCommit({
              owner: org,
              repo: analysisRepo,
              message: `chore(sa-${saNumber}): scaffold SA 分析文件`,
              tree: scaffoldTree.data.sha,
              parents: [mainRef.data.object.sha],
            });

            await github.rest.git.updateRef({
              owner: org,
              repo: analysisRepo,
              ref: `heads/${branchName}`,
              sha: scaffoldCommit.data.sha,
            });

            // 建立 SA Draft PR
            let saPrNumber = null;
            let saPrUrl = null;
            try {
              const saPr = await github.rest.pulls.create({
                owner: org,
                repo: analysisRepo,
                head: branchName,
                base: 'main',
                draft: true,
                title: `[SA] ${epicTitle}`,
                body: `Closes #${saNumber}`,
              });
              saPrNumber = saPr.data.number;
              saPrUrl = saPr.data.html_url;
            } catch (e) {
              console.log(`SA Draft PR 建立失敗（非阻斷性）：${e.message}`);
            }

            // 回填 SA Issue body：編號 + 分支連結 + Draft PR 連結
            await github.rest.issues.update({
              owner: org,
              repo: analysisRepo,
              issue_number: saNumber,
              body: saIssue.data.body
                .replace('SA Issue：#（本 Issue）', `SA Issue：#${saNumber}`)
                .replace('分支：（待填入）', `分支：[${branchName}](https://github.com/${org}/${analysisRepo}/tree/${branchName})`)
                .replace('Draft PR：（待建立）', saPrUrl ? `Draft PR：[#${saPrNumber}](${saPrUrl})` : 'Draft PR：（未建立）')
                .replace('business-logic.md：（待填入）', `sa-${saNumber}-logic.md：[SA/sa-${saNumber}-logic.md](https://github.com/${org}/${analysisRepo}/blob/${branchName}/SA/sa-${saNumber}-logic.md)`),
            });

            // 6. 在 Epic Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: 'P1-project',
              issue_number: epicNumber,
              body: [
                `✅ **SA Issue 已自動建立**`,
                `- Issue：[P1-design #${saNumber}](https://github.com/${org}/${analysisRepo}/issues/${saNumber})`,
                `- 分支：\`${branchName}\``,
                ``,
                `SA 請至 P1-design 開始系統分析。`,
              ].join('\n'),
            });

            core.setOutput('sa_number', String(saNumber));
            core.setOutput('branch', branchName);

      - name: Checkout P1-design SA branch
        uses: actions/checkout@v4
        with:
          repository: MPinfo-Co/P1-design
          ref: ${{ steps.create-sa.outputs.branch }}
          path: P1-design
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Build SA prompt
        run: |
          SA_NUMBER="${{ steps.create-sa.outputs.sa_number }}"
          sed "s/ISSUE_NUMBER/${SA_NUMBER}/g" P1-design/prompts/sa-writer-prompt.md > /tmp/sa-prompt.txt
          echo "Prompt built for SA #$SA_NUMBER"

      - name: Run SA Worker Agent
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        working-directory: P1-design
        run: claude --dangerously-skip-permissions --print < /tmp/sa-prompt.txt

      - name: Commit SA 分析文件
        working-directory: P1-design
        run: |
          SA_NUMBER="${{ steps.create-sa.outputs.sa_number }}"
          BRANCH="${{ steps.create-sa.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "SA/sa-${SA_NUMBER}-logic.md"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(sa-${SA_NUMBER}): SA 產出 SA 分析文件"
          git push origin "$BRANCH"

      - name: Post comment to SA issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issueNumber = parseInt('${{ steps.create-sa.outputs.sa_number }}');
            const branch = '${{ steps.create-sa.outputs.branch }}';

            await github.rest.issues.createComment({
              owner: 'MPinfo-Co',
              repo: 'P1-design',
              issue_number: issueNumber,
              body: [
                '🤖 SA 分析文件已自動產出，請至 branch 確認：',
                `- 檔案：\`SA/sa-${issueNumber}-logic.md\``,
                `- Branch：\`${branch}\``,
                '',
                '確認無誤後請 merge。',
              ].join('\n'),
            });
